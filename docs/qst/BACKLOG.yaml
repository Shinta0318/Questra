version: 1
updated: 2026-06-21
source: docs/product/qst_backlog.md
notes:
  - QST-037 through QST-043 already exist in the current backlog as completed MVP/beta work.
  - The requested Arc Experience Epic has been renumbered to QST-046 through QST-059 to avoid collisions.
  - Existing QST-044 and QST-045 are deferred while Arc Experience work is promoted to MVP priority.
  - QST-073 through QST-090 are planned in docs/qst/FEATURE_EXPANSION_BACKLOG.yaml.
rules:
  selection:
    - Pick the first Ready item by numeric order.
    - Prioritize priority P0 before P1 before P2 when numeric order is equal within an epic.
    - Keep Arc user-facing language as navigator/companion framing, not AI assistant framing.
    - Do not use Story as a product concept.
epics:
