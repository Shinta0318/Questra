    title: Arc Experience Epic
    status: Active
    priority: P0
    rationale: Arc official character images make Arc experience a primary MVP differentiator.
    starts_after: QST-036
    requested_range: QST-037-QST-050
    assigned_range: QST-046-QST-059
    release_manager_reflection:
      phase: MVP / Internal beta
      impact: Raises Arc Experience readiness as a primary MVP differentiator.
      promoted_over:
        - QST-044 Performance measurement pass
        - QST-045 Beta feedback operations
  - id: FEATURE-EXPANSION
