    status: Done
    dependencies: [QST-083]
    goal: Add a renderer-neutral animation event interface for Arc reactions.
    scope:
      - Define Arc animation event types such as idle, blink, celebrate, concern, thinking, and transition.
      - Map current PNG widget motion to event metadata.
      - Keep implementation compatible with future Rive/GLB renderers.
    acceptance:
