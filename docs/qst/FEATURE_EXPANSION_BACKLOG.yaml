    dependencies: [QST-069, QST-071]
    goal: Define and implement privacy-conscious event tracking boundaries for beta learning.
    scope:
      - Add analytics event taxonomy for core actions.
      - Add local no-op analytics service and repository boundary for future provider.
      - Track Quest created, Mission completed, Trail posted, Arc Chat sent, Guild draft, media attached, and onboarding completed.
