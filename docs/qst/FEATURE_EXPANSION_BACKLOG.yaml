  - id: QST-080
    title: Guild Safe Posting Review
    priority: P0
    status: Done
    dependencies: [QST-079, QST-054]
    goal: Add a lightweight Arc review before Guild posting to reduce personal information and unsafe sharing.
    scope:
      - Add safe posting review service.
