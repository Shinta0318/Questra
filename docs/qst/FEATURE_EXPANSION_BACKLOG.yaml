version: 1
updated: 2026-06-21
epic:
  id: FEATURE-EXPANSION
  title: Questra Feature Expansion Epic
  range: QST-073-QST-090
  goal: Improve app feature depth, retention, differentiation, and beta-to-launch readiness without destabilizing the MVP.
  constraints:
    - Do not use Story as a product concept.
    - Do not call Arc an AI assistant in user-facing text.
    - Keep MVP and Beta flows stable.
    - Do not introduce complex paid features yet.
    - Prefer incremental Flutter and Supabase changes.
items:
  - id: QST-073
    title: Arc Emotion Timeline
    priority: P0
    status: Done
    dependencies: [QST-068, QST-070]
    completed_by:
      report: reports/qst/QST-073.md
    goal: Store and display Arc emotional history based on user journey actions.
    scope:
      - Add Arc emotion event model and repository boundary.
      - Record emotion events for Quest creation, Mission completion, Trail posting, Reflection, Arc Chat, and concern states.
      - Add a lightweight Arc Emotion Timeline surface in Arc or Profile.
      - Keep local fallback behavior for unconfigured Supabase.
    acceptance:
      - Arc emotion events can be created from major journey actions.
      - Timeline shows emotion, reason, source type, and timestamp.
      - Empty state uses Arc-native Japanese copy.
      - User-facing text avoids assistant framing.
      - Flutter analyze and tests pass.
    files_likely_to_change:
      - apps/mobile/lib/features/arc/arc_emotion_timeline_model.dart
      - apps/mobile/lib/features/arc/arc_emotion_timeline_repository.dart
      - apps/mobile/lib/features/arc/arc_screen.dart
      - apps/mobile/lib/features/quest/quest_controller.dart
      - apps/mobile/lib/features/mission/mission_controller.dart
      - apps/mobile/lib/features/trail/trail_controller.dart
      - supabase/migrations/
      - apps/mobile/test/
  - id: QST-074
    title: Arc Action Trigger Rules
    priority: P0
    status: Done
    dependencies: [QST-073]
    goal: Automatically switch Arc expression and copy in response to key user states and actions.
    scope:
      - Add deterministic Arc action trigger service.
      - Map Quest creation, Mission completion, Trail posting, Reflection, inactivity, unauthenticated state, and save failures to Arc expression/copy.
      - Feed trigger decisions into Home, Arc Chat, Quest Detail, Mission, and Trail surfaces.
    acceptance:
      - Trigger rules are centralized and testable.
      - Each major MVP action resolves an Arc emotion and short Japanese message.
      - Save failure and unauthenticated states are handled gently.
      - Existing core flows remain stable.
    files_likely_to_change:
      - apps/mobile/lib/features/arc/arc_action_trigger_service.dart
      - apps/mobile/lib/features/home/home_screen.dart
      - apps/mobile/lib/features/quest/quest_detail_screen.dart
      - apps/mobile/lib/features/mission/mission_screen.dart
      - apps/mobile/lib/features/trail/trail_screen.dart
      - apps/mobile/test/
    completed_by:
      report: reports/qst/QST-074.md
  - id: QST-075
    title: Quest Milestone System
    priority: P0
    status: Done
    dependencies: [QST-063, QST-065]
    goal: Break Quests into visible Milestones so users can understand progress beyond a flat percentage.
    scope:
      - Add Milestone model, repository, and Supabase migration proposal or implementation.
      - Show Milestones on Quest Detail.
      - Allow generated Quest Guide output to suggest Milestones.
      - Connect Mission candidates to Milestones when possible.
    acceptance:
      - Quest Detail shows Milestones with status and progress.
      - At least one Milestone can be created or generated per Quest.
      - Milestone status can be updated without breaking Quest progress.
      - Supabase ownership follows existing Quest owner boundaries.
    files_likely_to_change:
      - apps/mobile/lib/features/quest/quest_milestone_model.dart
      - apps/mobile/lib/features/quest/quest_milestone_repository.dart
      - apps/mobile/lib/features/quest/quest_detail_screen.dart
      - apps/mobile/lib/features/quest/arc_quest_guide_service.dart
