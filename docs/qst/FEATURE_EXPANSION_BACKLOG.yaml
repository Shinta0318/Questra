      - apps/mobile/test/
    completed_by:
      report: reports/qst/QST-075.md
  - id: QST-076
    title: Mission Reminder / Signal MVP
    priority: P0
    status: Done
    dependencies: [QST-053, QST-075]
    goal: Introduce a lightweight Signal foundation for Mission due dates, stalled Missions, and gentle reminders.
    scope:
      - Add Signal model and deterministic reminder rules.
      - Show Signals in Home and Mission surfaces.
      - Avoid push notification complexity for now.
      - Support due-soon, overdue, stale, and suggested-small-step Signals.
    acceptance:
      - Signals can be generated from Mission and Quest context.
      - Home shows the most relevant Signal.
      - Signals use gentle Arc language and do not shame users.
      - No platform notification permission is required for MVP.
    files_likely_to_change:
      - apps/mobile/lib/features/signal/
      - apps/mobile/lib/features/home/home_screen.dart
      - apps/mobile/lib/features/mission/mission_screen.dart
      - apps/mobile/test/
    completed_by:
