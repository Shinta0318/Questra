    priority: P1
    status: Done
    dependencies: [QST-034, QST-035, QST-072]
    goal: Let users revisit Trails in a beautiful chronological timeline.
    scope:
      - Add Timeline view or mode to Trail screen.
      - Group Trails by date or Quest.
      - Include media thumbnail, reflection marker, Arc highlight marker, and source type.
      - Keep existing Trail list behavior available.
    acceptance:
