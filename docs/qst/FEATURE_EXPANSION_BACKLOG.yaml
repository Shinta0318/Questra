  - id: QST-083
    title: Arc 3D Readiness Architecture
    priority: P1
    status: Done
    dependencies: [QST-047, QST-073]
    goal: Prepare Arc expression architecture for future PNG, Rive, and GLB/3D implementations.
    scope:
      - Add Arc visual asset descriptor independent of PNG path.
      - Keep existing PNG renderer as the default.
      - Avoid adding actual 3D runtime dependencies in this QST.
    acceptance:
      - Arc expression decisions return a renderer-agnostic asset descriptor.
      - Existing ArcWidget still renders current PNG assets.
      - Tests prove PNG behavior remains unchanged.
      - Future Rive/GLB types can be represented.
    files_likely_to_change:
      - apps/mobile/lib/widgets/arc/
      - apps/mobile/lib/features/arc/arc_expression_engine.dart
      - apps/mobile/test/
    completed_by:
      report: reports/qst/QST-083.md
  - id: QST-084
